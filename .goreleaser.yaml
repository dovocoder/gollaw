version: 2

project_name: gollaw

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: gollaw
    main: .
    binary: gollaw
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
      - freebsd
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: freebsd
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/dovocoder/gollaw/internal/cli.Version={{ .Version }}
      - -X github.com/dovocoder/gollaw/internal/action.actionVersion={{ .Version }}

archives:
  - id: default
    ids:
      - gollaw
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  github:
    owner: dovocoder
    name: gollaw
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## Gollaw {{ .Tag }}

    Install with Go:

    ```bash
    go install github.com/dovocoder/gollaw@{{ .Tag }}
    ```
