name: Gollaw
description: Whole-codebase intelligence for Go — dead code, complexity, duplication, and more
author: dovocoder

inputs:
  base-ref:
    description: Git ref to compare against (for diff-based analysis)
    default: origin/main
  format:
    description: Output format (markdown or json)
    default: markdown
  dir:
    description: Directory to analyze (defaults to repository root)
    default: "."

runs:
  using: composite
  steps:
    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Install Gollaw
      shell: bash
      run: go install github.com/dovocoder/gollaw@latest

    - name: Checkout full history
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run Gollaw
      shell: bash
      run: |
        gollaw audit --base-ref "${{ inputs.base-ref }}" --format "${{ inputs.format }}" --dir "${{ inputs.dir }}"
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
        GITHUB_OUTPUT: ${{ env.GITHUB_OUTPUT }}

    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const outputPath = process.env.GITHUB_OUTPUT || '';
          if (!outputPath || !fs.existsSync(outputPath)) return;
          const output = fs.readFileSync(outputPath, 'utf8');
          const match = output.match(/gollaw_comment<<EOF\n([\s\S]*?)\nEOF/);
          if (match) {
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: match[1]
            });
          }
